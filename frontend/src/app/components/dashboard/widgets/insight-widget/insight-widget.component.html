<div class="widget-card">
  <div class="widget-header">
    <h3>Daily AI Insight</h3>
  </div>
  <div class="widget-content" style="font-size: 1.1rem; line-height: 1.5; color: #2c3e50; text-align: left; padding: 1rem;">
    <p>{{ data || 'Loading insight...' }}</p>
  </div>
  <div class="widget-footer">
    @if (hasVoted) {
      <span>Thank you for voting!</span>
    } @else {
      <span>Was this helpful?</span>
    }
    <button (click)="vote(true)" [disabled]="hasVoted" title="Thumbs Up">👍</button>
    <button (click)="vote(false)" [disabled]="hasVoted" title="Thumbs Down">👎</button>
  </div>
</div>
