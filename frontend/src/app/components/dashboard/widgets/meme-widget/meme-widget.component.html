<div class="widget-card">
  <div class="widget-header">
    <h3>Crypto Meme</h3>
  </div>
  <div class="widget-content" style="padding: 0;">
    @if (currentMemeUrl) {
      <img 
        [src]="currentMemeUrl" 
        alt="Crypto meme" 
        style="max-width: 100%; max-height: 250px; border-radius: 8px; object-fit: contain; margin: 1rem 0;" 
      />
    } @else {
      <p>Loading meme...</p>
    }
  </div>
  <div class="widget-footer">
    @if (hasVoted) {
      <span>Thank you for voting!</span>
    } @else {
      <span>Was this helpful?</span>
    }
    <button (click)="vote(true)" [disabled]="hasVoted" title="Thumbs Up">👍</button>
    <button (click)="vote(false)" [disabled]="hasVoted" title="Thumbs Down">👎</button>
  </div>
</div>
